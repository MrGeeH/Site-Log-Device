<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Histórico de Logs dos Dispositivos</title>
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Socket.IO Client -->
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <h1>Histórico de Logs dos Dispositivos</h1>

  <div style="text-align: center;">
    <input type="text" id="deviceIdInput" placeholder="Digite o ID do dispositivo" autocomplete="off">
    <button onclick="buscarLogs()">Buscar</button>
    <button onclick="carregarTodosLogs()">Ver todos</button>
    
    <label for="limitSelect">Mostrar:</label>
    <select id="limitSelect" onchange="atualizarLimite()">
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="all">Todos</option>
    </select>
    
    <button onclick="exportarCSV()">Exportar CSV</button>
  </div>

  <h2 style="text-align: center; margin-top: 30px; color: #333;">📡 Logs em Tempo Real</h2>
  <div id="realtime-container">Aguardando dados em tempo real...</div>

  <h2 style="text-align: center; margin-top: 40px; color: #333;">🗄️ Histórico de Logs</h2>
  <div id="log-container">Carregando histórico...</div>
  <div class="pagination" id="pagination"></div>

  <script src="main.js"></script>
</body>
</html>
